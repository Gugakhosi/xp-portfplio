<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
  <rect width="300" height="600" fill="#f2f5fa"/>
  <rect width="300" height="80" fill="#0e4bb3"/>
  <text x="20" y="36" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff" opacity="0.85">Budgets</text>
  <text x="20" y="60" font-family="Segoe UI, Arial" font-size="19" font-weight="700" fill="#ffffff">Keep it on track</text>

  <g font-family="Segoe UI, Arial">
    <rect x="16" y="100" width="268" height="88" rx="12" fill="#ffffff" stroke="#e3e8f1"/>
    <text x="30" y="124" font-size="13" font-weight="700" fill="#21324a">Food</text>
    <text x="270" y="124" text-anchor="end" font-size="11" fill="#7a8699">$420 / $500</text>
    <rect x="30" y="138" width="240" height="10" rx="5" fill="#edf0f6"/>
    <rect x="30" y="138" width="202" height="10" rx="5" fill="#2b8cff"/>
    <text x="30" y="172" font-size="10" fill="#1e9b4f">On track · 16% left</text>

    <rect x="16" y="200" width="268" height="88" rx="12" fill="#ffffff" stroke="#e3e8f1"/>
    <text x="30" y="224" font-size="13" font-weight="700" fill="#21324a">Transport</text>
    <text x="270" y="224" text-anchor="end" font-size="11" fill="#7a8699">$210 / $250</text>
    <rect x="30" y="238" width="240" height="10" rx="5" fill="#edf0f6"/>
    <rect x="30" y="238" width="201" height="10" rx="5" fill="#f0a93a"/>
    <text x="30" y="272" font-size="10" fill="#b67418">Watch out · 16% left</text>

    <rect x="16" y="300" width="268" height="88" rx="12" fill="#ffffff" stroke="#e3e8f1"/>
    <text x="30" y="324" font-size="13" font-weight="700" fill="#21324a">Leisure</text>
    <text x="270" y="324" text-anchor="end" font-size="11" fill="#7a8699">$180 / $150</text>
    <rect x="30" y="338" width="240" height="10" rx="5" fill="#edf0f6"/>
    <rect x="30" y="338" width="240" height="10" rx="5" fill="#e85c6d"/>
    <text x="30" y="372" font-size="10" fill="#d04848">Over budget by $30</text>

    <rect x="16" y="400" width="268" height="88" rx="12" fill="#ffffff" stroke="#e3e8f1"/>
    <text x="30" y="424" font-size="13" font-weight="700" fill="#21324a">Bills</text>
    <text x="270" y="424" text-anchor="end" font-size="11" fill="#7a8699">$140 / $300</text>
    <rect x="30" y="438" width="240" height="10" rx="5" fill="#edf0f6"/>
    <rect x="30" y="438" width="112" height="10" rx="5" fill="#1e9b4f"/>
    <text x="30" y="472" font-size="10" fill="#1e9b4f">Great · 53% left</text>

    <rect x="16" y="500" width="268" height="34" rx="10" fill="#2b8cff"/>
    <text x="150" y="523" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">+ Add new budget</text>
  </g>

  <rect x="0" y="544" width="300" height="56" fill="#ffffff" stroke="#e3e8f1"/>
  <g font-family="Segoe UI, Arial" font-size="10" fill="#21324a" text-anchor="middle">
    <text x="40" y="582">Home</text>
    <text x="110" y="582">Stats</text>
    <text x="190" y="582">Budget</text>
    <text x="260" y="582">Me</text>
    <circle cx="190" cy="562" r="4" fill="#2b8cff"/>
  </g>
</svg>
